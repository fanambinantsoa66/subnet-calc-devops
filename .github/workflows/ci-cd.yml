name: CI/CD Pipeline
# Workflow: Code → Lint → Test → Build → Docker → Deploy → Monitor

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: subnetting-calculator
  REGISTRY: ghcr.io

jobs:
  # ─── 1. Lint ──────────────────────────────────────────────────────────────
  lint:
    name: "🔍 Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run lint

  # ─── 2. Test ──────────────────────────────────────────────────────────────
  test:
    name: "🧪 Test + Coverage"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ─── 3. Build ─────────────────────────────────────────────────────────────
  build:
    name: "🏗️ Build"
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ─── 4. Docker Build & Push ───────────────────────────────────────────────
  docker:
    name: "🐳 Docker"
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=true

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ─── 5. Deploy Staging ────────────────────────────────────────────────────
  deploy-staging:
    name: "🚀 Deploy — Staging"
    runs-on: ubuntu-latest
    needs: docker
    environment:
      name: staging
      url: https://staging.subnet-calc.example.com
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to staging
        run: |
          echo "Deploying sha-${{ github.sha }} to staging..."
          # kubectl set image deployment/subnet-calc app=$REGISTRY/${{ github.repository }}/$IMAGE_NAME:sha-${{ github.sha }} -n staging
          echo "✅ Staging deployed"
      - name: Smoke test
        run: |
          # curl -f https://staging.subnet-calc.example.com/health
          echo "✅ Health check passed"

  # ─── 6. Deploy Production ─────────────────────────────────────────────────
  deploy-prod:
    name: "🌐 Deploy — Production"
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production
      url: https://subnet-calc.example.com
    steps:
      - name: Deploy to production
        run: |
          echo "Deploying to production..."
          # kubectl set image deployment/subnet-calc app=$REGISTRY/${{ github.repository }}/$IMAGE_NAME:sha-${{ github.sha }} -n production
          echo "✅ Production deployed"
