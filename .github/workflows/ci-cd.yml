name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: "🔍 Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: echo "✅ Lint OK"

  test:
    name: "🧪 Test"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm test

  build:
    name: "🏗️ Build"
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run build

  docker:
    name: "🐳 Docker"
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - run: echo "✅ Docker build simulé"

  deploy-staging:
    name: "🚀 Deploy — Staging"
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - run: echo "✅ Déployé en Staging"

  deploy-prod:
    name: "🌐 Deploy — Production"
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - run: echo "✅ Déployé en Production"
