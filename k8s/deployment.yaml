# ─── Kubernetes Manifests — subnet-calc ─────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: subnet-calc
  namespace: production
  labels:
    app: subnet-calc
    version: "1.0.0"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: subnet-calc
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0   # Zero-downtime
  template:
    metadata:
      labels:
        app: subnet-calc
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: app
          image: ghcr.io/yourorg/subnet-calc:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: subnet-calc
  namespace: production
spec:
  selector:
    app: subnet-calc
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: subnet-calc
  namespace: production
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  rules:
    - host: subnet-calc.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: subnet-calc
                port:
                  number: 80
  tls:
    - hosts:
        - subnet-calc.example.com
      secretName: subnet-calc-tls
